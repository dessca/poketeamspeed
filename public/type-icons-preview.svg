<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720" role="img" aria-labelledby="title desc">
  <title id="title">Pokemon type icon direction preview</title>
  <desc id="desc">A preview sheet of eighteen original white type symbols intended to sit directly inside colored type buttons.</desc>
  <defs>
    <style>
      .bg { fill: #0f172a; }
      .label { fill: #e5edf7; font: 700 17px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; text-anchor: middle; }
      .type-tile { rx: 18; filter: url(#shadow); }
      .icon { fill: none; stroke: #fff; stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; }
      .fill { fill: #fff; stroke: none; }
      .thin { stroke-width: 6; }
      .button-text { fill: #fff; font: 850 20px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#020617" flood-opacity=".24"/>
    </filter>
    <symbol id="normal" viewBox="0 0 100 100">
      <circle class="icon" cx="50" cy="50" r="24"/>
      <circle class="fill" cx="50" cy="50" r="7"/>
    </symbol>
    <symbol id="fire" viewBox="0 0 100 100">
      <path class="fill" d="M51 88c-18 0-32-13-32-31 0-14 8-25 18-35 4-4 8-9 9-16 13 9 16 22 13 33 7-4 11-10 12-18 8 8 12 19 12 31 0 21-14 36-32 36Zm-2-12c9 0 16-7 16-17 0-7-3-13-8-18-1 6-4 11-9 15 1-8-1-16-8-23-1 6-5 11-8 16-3 4-5 8-5 14 0 8 8 13 22 13Z"/>
    </symbol>
    <symbol id="water" viewBox="0 0 100 100">
      <path class="fill" d="M50 9c16 21 27 35 27 51 0 17-12 29-27 29S23 77 23 60C23 44 34 30 50 9Zm0 68c9 0 16-7 16-17 0-8-6-18-16-32-10 14-16 24-16 32 0 10 7 17 16 17Z"/>
    </symbol>
    <symbol id="electric" viewBox="0 0 100 100">
      <path class="fill" d="M58 5 21 55h27L40 95l39-52H52L58 5Z"/>
    </symbol>
    <symbol id="grass" viewBox="0 0 100 100">
      <path class="fill" d="M82 15C48 15 23 32 18 60c-3 17 8 29 24 29 29 0 44-31 40-74ZM33 72c10-19 25-31 41-42-8 17-21 32-41 42Z"/>
    </symbol>
    <symbol id="ice" viewBox="0 0 100 100">
      <path class="icon" d="M50 12v76M18 31l64 38M82 31 18 69"/>
      <path class="icon thin" d="m37 22 13 12 13-12M37 78l13-12 13 12M22 45l17-5-4-17M78 45l-17-5 4-17M22 55l17 5-4 17M78 55l-17 5 4 17"/>
    </symbol>
    <symbol id="fighting" viewBox="0 0 100 100">
      <path class="fill" d="M28 23c0-7 5-12 12-12 4 0 7 2 9 4 2-5 6-8 12-8 7 0 12 5 12 12v23h2c8 0 14 6 14 14 0 6-3 11-8 13L60 91H33L18 68V36c0-7 4-13 10-13Zm11 0v30H27v11l12 16h16l18-19c2-2 3-4 3-6 0-3-2-5-5-5H61V19c0-1-1-2-2-2s-2 1-2 2v27H45V23c0-1-1-2-3-2s-3 1-3 2Z"/>
    </symbol>
    <symbol id="poison" viewBox="0 0 100 100">
      <circle class="fill" cx="45" cy="43" r="24"/>
      <circle class="fill" cx="69" cy="62" r="12"/>
      <circle class="fill" cx="30" cy="69" r="8"/>
      <circle class="bg" cx="37" cy="37" r="6" opacity=".28"/>
      <circle class="bg" cx="52" cy="50" r="4" opacity=".28"/>
    </symbol>
    <symbol id="ground" viewBox="0 0 100 100">
      <path class="fill" d="M13 78 36 26l15 29 13-20 23 43H13Zm24-25-8 18h29L48 58l-9 9-7-6 5-8Z"/>
    </symbol>
    <symbol id="flying" viewBox="0 0 100 100">
      <path class="fill" d="M88 19C61 21 37 32 14 56c17-5 31-7 43-6-10 8-20 16-31 31 25-9 44-24 57-45 4-6 5-12 5-17Z"/>
      <path class="bg" d="M27 57c18-13 36-20 54-24-19 8-35 18-49 31l-5-7Z" opacity=".22"/>
    </symbol>
    <symbol id="psychic" viewBox="0 0 100 100">
      <path class="icon" d="M14 50s14-25 36-25 36 25 36 25-14 25-36 25-36-25-36-25Z"/>
      <circle class="fill" cx="50" cy="50" r="12"/>
      <path class="icon thin" d="M50 8c15 11 21 22 20 35M50 92C35 81 29 70 30 57"/>
    </symbol>
    <symbol id="bug" viewBox="0 0 100 100">
      <ellipse class="fill" cx="50" cy="58" rx="24" ry="29"/>
      <circle class="fill" cx="50" cy="27" r="14"/>
      <path class="icon thin" d="M35 15 25 6M65 15l10-9M24 51H9M76 51h15M27 70l-13 8M73 70l13 8"/>
      <path class="bg" d="M50 31v51" opacity=".24" stroke="#0f172a" stroke-width="5" stroke-linecap="round"/>
    </symbol>
    <symbol id="rock" viewBox="0 0 100 100">
      <path class="fill" d="M25 18h35l23 24-11 40H29L13 50l12-32Zm7 11-7 21 10 20h29l7-25-16-16H32Z"/>
      <path class="bg" d="M34 29 25 50l10 20 14-22-17-19Z" opacity=".2"/>
    </symbol>
    <symbol id="ghost" viewBox="0 0 100 100">
      <path class="fill" d="M19 86V44c0-21 13-34 31-34s31 13 31 34v42l-12-8-10 8-9-8-9 8-10-8-12 8Z"/>
      <circle class="bg" cx="40" cy="43" r="6" opacity=".3"/>
      <circle class="bg" cx="61" cy="43" r="6" opacity=".3"/>
      <path class="bg" d="M39 62c7 5 15 5 22 0" opacity=".3" stroke="#0f172a" stroke-width="5" stroke-linecap="round"/>
    </symbol>
    <symbol id="dragon" viewBox="0 0 100 100">
      <path class="fill" d="M68 8c-5 15-12 24-23 32 18-2 29 8 29 23 0 14-11 25-27 25-15 0-27-8-34-21 8 4 16 5 23 3-9-7-13-16-11-28 4 7 10 12 18 14-3-18 6-34 25-48Zm-4 53c0-6-5-11-13-11-5 0-10 2-16 6 4 12 10 20 20 20 6 0 9-6 9-15Z"/>
    </symbol>
    <symbol id="dark" viewBox="0 0 100 100">
      <path class="fill" d="M69 12c-8 10-13 22-13 36 0 18 10 33 25 41-5 2-11 3-17 3-24 0-44-20-44-44S40 4 64 4c2 0 4 0 5 1Z"/>
      <path class="bg" d="M63 20c-12 7-20 20-20 35 0 9 3 17 8 24-11-6-19-18-19-31 0-15 10-27 31-28Z" opacity=".2"/>
    </symbol>
    <symbol id="steel" viewBox="0 0 100 100">
      <path class="fill" d="M50 8 87 29v42L50 92 13 71V29L50 8Zm0 17L28 38v24l22 13 22-13V38L50 25Z"/>
      <circle class="fill" cx="50" cy="50" r="10"/>
    </symbol>
    <symbol id="fairy" viewBox="0 0 100 100">
      <path class="fill" d="M50 7 61 37l31 13-31 13-11 30-11-30L8 50l31-13L50 7Z"/>
      <path class="fill" d="M78 12 83 26l14 5-14 5-5 14-5-14-14-5 14-5 5-14Z" opacity=".78"/>
      <path class="fill" d="M22 59 26 70l11 4-11 4-4 11-4-11-11-4 11-4 4-11Z" opacity=".72"/>
    </symbol>
  </defs>

  <rect width="1080" height="720" rx="34" class="bg"/>
  <text x="540" y="56" class="label" style="font-size:26px">Type Symbol Direction Preview</text>

  <g transform="translate(76 98)">
    <g transform="translate(0 0)"><rect class="type-tile" width="138" height="74" fill="#a4acaf"/><use href="#normal" transform="translate(10 8) scale(.58)"/><text x="66" y="46" class="button-text">Normal</text><text x="69" y="107" class="label">Normal</text></g>
    <g transform="translate(154 0)"><rect class="type-tile" width="138" height="74" fill="#fd7d24"/><use href="#fire" transform="translate(10 8) scale(.58)"/><text x="66" y="46" class="button-text">Fire</text><text x="69" y="107" class="label">Fire</text></g>
    <g transform="translate(308 0)"><rect class="type-tile" width="138" height="74" fill="#4592c4"/><use href="#water" transform="translate(10 8) scale(.58)"/><text x="66" y="46" class="button-text">Water</text><text x="69" y="107" class="label">Water</text></g>
    <g transform="translate(462 0)"><rect class="type-tile" width="138" height="74" fill="#eed535"/><use href="#electric" transform="translate(10 8) scale(.58)"/><text x="66" y="46" class="button-text">Electric</text><text x="69" y="107" class="label">Electric</text></g>
    <g transform="translate(616 0)"><rect class="type-tile" width="138" height="74" fill="#9bcc50"/><use href="#grass" transform="translate(10 8) scale(.58)"/><text x="66" y="46" class="button-text">Grass</text><text x="69" y="107" class="label">Grass</text></g>
    <g transform="translate(770 0)"><rect class="type-tile" width="138" height="74" fill="#51c4e7"/><use href="#ice" transform="translate(10 8) scale(.58)"/><text x="66" y="46" class="button-text">Ice</text><text x="69" y="107" class="label">Ice</text></g>

    <g transform="translate(0 174)"><rect class="type-tile" width="138" height="74" fill="#d56723"/><use href="#fighting" transform="translate(10 8) scale(.58)"/><text x="66" y="46" class="button-text">Fighting</text><text x="69" y="107" class="label">Fighting</text></g>
    <g transform="translate(154 174)"><rect class="type-tile" width="138" height="74" fill="#b97fc9"/><use href="#poison" transform="translate(10 8) scale(.58)"/><text x="66" y="46" class="button-text">Poison</text><text x="69" y="107" class="label">Poison</text></g>
    <g transform="translate(308 174)"><rect class="type-tile" width="138" height="74" fill="#ab9842"/><use href="#ground" transform="translate(10 8) scale(.58)"/><text x="66" y="46" class="button-text">Ground</text><text x="69" y="107" class="label">Ground</text></g>
    <g transform="translate(462 174)"><rect class="type-tile" width="138" height="74" fill="#3dc7ef"/><use href="#flying" transform="translate(10 8) scale(.58)"/><text x="66" y="46" class="button-text">Flying</text><text x="69" y="107" class="label">Flying</text></g>
    <g transform="translate(616 174)"><rect class="type-tile" width="138" height="74" fill="#f366b9"/><use href="#psychic" transform="translate(10 8) scale(.58)"/><text x="66" y="46" class="button-text">Psychic</text><text x="69" y="107" class="label">Psychic</text></g>
    <g transform="translate(770 174)"><rect class="type-tile" width="138" height="74" fill="#729f3f"/><use href="#bug" transform="translate(10 8) scale(.58)"/><text x="66" y="46" class="button-text">Bug</text><text x="69" y="107" class="label">Bug</text></g>

    <g transform="translate(0 348)"><rect class="type-tile" width="138" height="74" fill="#a38c21"/><use href="#rock" transform="translate(10 8) scale(.58)"/><text x="66" y="46" class="button-text">Rock</text><text x="69" y="107" class="label">Rock</text></g>
    <g transform="translate(154 348)"><rect class="type-tile" width="138" height="74" fill="#7b62a3"/><use href="#ghost" transform="translate(10 8) scale(.58)"/><text x="66" y="46" class="button-text">Ghost</text><text x="69" y="107" class="label">Ghost</text></g>
    <g transform="translate(308 348)"><rect class="type-tile" width="138" height="74" fill="#f16e57"/><use href="#dragon" transform="translate(10 8) scale(.58)"/><text x="66" y="46" class="button-text">Dragon</text><text x="69" y="107" class="label">Dragon</text></g>
    <g transform="translate(462 348)"><rect class="type-tile" width="138" height="74" fill="#707070"/><use href="#dark" transform="translate(10 8) scale(.58)"/><text x="66" y="46" class="button-text">Dark</text><text x="69" y="107" class="label">Dark</text></g>
    <g transform="translate(616 348)"><rect class="type-tile" width="138" height="74" fill="#9eb7b8"/><use href="#steel" transform="translate(10 8) scale(.58)"/><text x="66" y="46" class="button-text">Steel</text><text x="69" y="107" class="label">Steel</text></g>
    <g transform="translate(770 348)"><rect class="type-tile" width="138" height="74" fill="#fdb9e9"/><use href="#fairy" transform="translate(10 8) scale(.58)"/><text x="66" y="46" class="button-text">Fairy</text><text x="69" y="107" class="label">Fairy</text></g>
  </g>
</svg>
